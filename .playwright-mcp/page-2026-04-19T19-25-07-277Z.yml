          - paragraph [ref=e1094]:
            - text: "Division between integers produces floating-point results. The behavior of division has changed significantly over time:"
            - superscript [ref=e1095]:
              - link "[112]" [ref=e1096] [cursor=pointer]:
                - /url: "#cite_note-pep0238-115"
          - list [ref=e1097]:
            - listitem [ref=e1098]:
              - text: The current version of Python (i.e., since 3.0) changed the
              - code [ref=e1099]: /
              - text: operator to always represent floating-point division, e.g.,
              - code [ref=e1100]: 5/2 == 2.5
              - text: .
            - listitem [ref=e1101]:
              - text: The floor division
              - code [ref=e1102]: //
              - text: operator was introduced, meaning that
              - code [ref=e1103]: 7//3 == 2
              - text: ","
              - code [ref=e1104]: "-7//3 == -3"
              - text: ","
              - code [ref=e1105]: 7.5//3 == 2.0
              - text: ", and"
              - code [ref=e1106]: "-7.5//3 == -3.0"
              - text: . For Python 2.7, adding the
              - code [ref=e1107]: from __future__ import division
              - text: statement allows a module in Python 2.7 to use Python 3.x rules for division (see above).
          - paragraph [ref=e1108]:
            - text: In Python terms, the
            - code [ref=e1109]: /
            - text: operator represents true division (or simply division), while the
            - code [ref=e1110]: //
            - text: operator represents floor division. Before version 3.0, the
