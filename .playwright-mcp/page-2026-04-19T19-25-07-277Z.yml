            - text: ", and"
            - link "garbage collection" [ref=e374] [cursor=pointer]:
              - /url: /wiki/Garbage_collection_(computer_science)
            - text: . Python supports multiple
            - link "programming paradigms" [ref=e375] [cursor=pointer]:
