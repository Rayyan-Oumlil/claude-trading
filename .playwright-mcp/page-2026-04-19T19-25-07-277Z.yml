            - text: .
          - paragraph [ref=e378]:
            - link "Guido van Rossum" [ref=e379] [cursor=pointer]:
              - /url: /wiki/Guido_van_Rossum
            - text: began working on Python in the late 1980s as a successor to the
            - link "ABC" [ref=e380] [cursor=pointer]:
              - /url: /wiki/ABC_(programming_language)
            - text: programming language. Python 3.0, released in 2008, was a major revision and not completely
            - link "backward-compatible" [ref=e381] [cursor=pointer]:
              - /url: /wiki/Backward-compatible
            - text: with earlier versions. Beginning with Python 3.5,
            - superscript [ref=e382]:
              - link "[39]" [ref=e383] [cursor=pointer]:
                - /url: "#cite_note-41"
            - text: capabilities and keywords for typing were added to the language, allowing optional
            - link "static typing" [ref=e384] [cursor=pointer]:
              - /url: /wiki/Static_typing
            - text: .
            - superscript [ref=e385]:
              - link "[40]" [ref=e386] [cursor=pointer]:
                - /url: "#cite_note-42"
            - text: As of 2026 , the
            - link "Python Software Foundation" [ref=e387] [cursor=pointer]:
              - /url: /wiki/Python_Software_Foundation
            - text: supports Python 3.10, 3.11, 3.12, 3.13, and 3.14, following the project's annual release cycle and five-year support policy. Python 3.15 is currently in the alpha development phase, and the stable release is expected to come out in October 2026.
            - superscript [ref=e388]:
              - link "[41]" [ref=e389] [cursor=pointer]:
                - /url: "#cite_note-43"
            - text: Earlier versions in the 3.x series have reached end-of-life and no longer receive security updates.
          - paragraph [ref=e390]:
            - text: Python has gained widespread use in the
            - link "machine learning" [ref=e391] [cursor=pointer]:
              - /url: /wiki/Machine_learning
            - text: community.
            - superscript [ref=e392]:
              - link "[42]" [ref=e393] [cursor=pointer]:
                - /url: "#cite_note-44"
            - superscript [ref=e394]:
              - link "[43]" [ref=e395] [cursor=pointer]:
                - /url: "#cite_note-45"
            - superscript [ref=e396]:
              - link "[44]" [ref=e397] [cursor=pointer]:
                - /url: "#cite_note-tiobecurrent-46"
            - superscript [ref=e398]:
              - link "[45]" [ref=e399] [cursor=pointer]:
                - /url: "#cite_note-47"
            - text: It is widely taught as an introductory programming language.
            - superscript [ref=e400]:
              - link "[46]" [ref=e401] [cursor=pointer]:
                - /url: "#cite_note-48"
            - text: Since 2003, Python has consistently ranked in the top ten of the most popular programming languages in the
            - link "TIOBE Programming Community Index" [ref=e402] [cursor=pointer]:
              - /url: /wiki/TIOBE_Programming_Community_Index
            - text: ", which ranks based on searches in 24 platforms."
            - superscript [ref=e403]:
              - link "[47]" [ref=e404] [cursor=pointer]:
                - /url: "#cite_note-49"
          - generic [ref=e405]:
            - heading "History" [level=2] [ref=e406]
            - generic [ref=e407]:
              - text: "["
