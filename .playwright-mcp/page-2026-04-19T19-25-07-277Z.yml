          - note [ref=e602]:
            - text: "Main article:"
            - link "Python syntax and semantics" [ref=e603] [cursor=pointer]:
              - /url: /wiki/Python_syntax_and_semantics
          - paragraph [ref=e604]:
            - text: Python is meant to be an easily readable language. Its formatting is visually uncluttered and often uses English keywords where other languages use punctuation. Unlike many other languages, it does not use
            - link "curly brackets" [ref=e605] [cursor=pointer]:
              - /url: /wiki/Curly_bracket_programming_language
            - text: to delimit blocks, and semicolons after statements are allowed but rarely used. It has fewer syntactic exceptions and special cases than
            - link "C" [ref=e606] [cursor=pointer]:
              - /url: /wiki/C_(programming_language)
            - text: or
            - link "Pascal" [ref=e607] [cursor=pointer]:
              - /url: /wiki/Pascal_(programming_language)
            - text: .
            - superscript [ref=e608]:
              - link "[85]" [ref=e609] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-52-87"
          - generic [ref=e610]:
            - heading "Indentation" [level=3] [ref=e611]
            - generic [ref=e612]:
              - text: "["
              - link "edit" [ref=e613] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=4
              - text: "]"
          - note [ref=e614]:
            - text: "Further information:"
            - link "Python syntax and semantics § Indentation" [ref=e615] [cursor=pointer]:
              - /url: /wiki/Python_syntax_and_semantics#Indentation
          - paragraph [ref=e616]:
            - text: Python uses
            - link "whitespace" [ref=e617] [cursor=pointer]:
              - /url: /wiki/Whitespace_character
            - text: indentation, rather than curly brackets or keywords, to delimit
            - link "blocks" [ref=e618] [cursor=pointer]:
              - /url: /wiki/Block_(programming)
            - text: . An increase in indentation comes after certain statements; a decrease in indentation signifies the end of the current block.
            - superscript [ref=e619]:
              - link "[86]" [ref=e620] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-53-88"
            - text: Thus, the program's visual structure accurately represents its semantic structure.
            - superscript [ref=e621]:
              - link "[87]" [ref=e622] [cursor=pointer]:
                - /url: "#cite_note-guttag-89"
            - text: This feature is sometimes termed the
            - link "off-side rule" [ref=e623] [cursor=pointer]:
              - /url: /wiki/Off-side_rule
            - text: . Some other languages use indentation this way; but in most, indentation has no semantic meaning. The recommended indent size is four spaces.
            - superscript [ref=e624]:
              - link "[88]" [ref=e625] [cursor=pointer]:
                - /url: "#cite_note-pep8-90"
          - generic [ref=e626]:
            - heading "Statements and control flow" [level=3] [ref=e627]
            - generic [ref=e628]:
              - text: "["
