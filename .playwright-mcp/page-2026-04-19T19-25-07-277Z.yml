            - link "test suites" [ref=e1224] [cursor=pointer]:
              - /url: /wiki/Test_suite
            - text: . However, because most of the standard library is cross-platform Python code, only a few modules must be altered or rewritten for variant implementations.
          - paragraph [ref=e1225]:
