              - text: US 2024
          - paragraph [ref=e417]:
            - text: Python was conceived in the late 1980s
            - superscript [ref=e418]:
              - link "[11]" [ref=e419] [cursor=pointer]:
                - /url: "#cite_note-venners-interview-pt-1-13"
            - text: by
            - link "Guido van Rossum" [ref=e420] [cursor=pointer]:
              - /url: /wiki/Guido_van_Rossum
            - text: at
            - link "Centrum Wiskunde & Informatica" [ref=e421] [cursor=pointer]:
              - /url: /wiki/Centrum_Wiskunde_%26_Informatica
            - text: (CWI) in the
            - link "Netherlands" [ref=e422] [cursor=pointer]:
              - /url: /wiki/Netherlands
            - text: .
            - superscript [ref=e423]:
              - link "[48]" [ref=e424] [cursor=pointer]:
                - /url: "#cite_note-timeline-of-python-50"
            - text: It was designed as a successor to the
            - link "ABC" [ref=e425] [cursor=pointer]:
              - /url: /wiki/ABC_(programming_language)
            - text: programming language, which was inspired by
            - link "SETL" [ref=e426] [cursor=pointer]:
              - /url: /wiki/SETL
            - text: ","
            - superscript [ref=e427]:
              - link "[49]" [ref=e428] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-12-51"
            - text: capable of
            - link "exception handling" [ref=e429] [cursor=pointer]:
              - /url: /wiki/Exception_handling
            - text: and interfacing with the
            - link "Amoeba" [ref=e430] [cursor=pointer]:
              - /url: /wiki/Amoeba_(operating_system)
            - text: operating system.
            - superscript [ref=e431]:
              - link "[18]" [ref=e432] [cursor=pointer]:
                - /url: "#cite_note-faq-created-20"
            - text: Python implementation began in December 1989.
            - superscript [ref=e433]:
              - link "[48]" [ref=e434] [cursor=pointer]:
                - /url: "#cite_note-timeline-of-python-50"
            - text: Van Rossum first released it in 1991 as Python 0.9.0.
            - superscript [ref=e435]:
              - link "[48]" [ref=e436] [cursor=pointer]:
                - /url: "#cite_note-timeline-of-python-50"
            - text: Van Rossum assumed sole responsibility for the project, as the lead developer, until 12 July 2018, when he announced his "permanent vacation" from responsibilities as Python's "
            - link "benevolent dictator for life" [ref=e437] [cursor=pointer]:
              - /url: /wiki/Benevolent_dictator_for_life
            - text: "\" (BDFL); this title was bestowed on him by the Python community to reflect his long-term commitment as the project's chief decision-maker."
            - superscript [ref=e438]:
              - link "[50]" [ref=e439] [cursor=pointer]:
                - /url: "#cite_note-lj-bdfl-resignation-52"
            - text: (He has since come out of retirement and is self-titled "BDFL-emeritus".) In January 2019, active Python core developers elected a five-member Steering Council to lead the project.
            - superscript [ref=e440]:
              - link "[51]" [ref=e441] [cursor=pointer]:
                - /url: "#cite_note-53"
            - superscript [ref=e442]:
              - link "[52]" [ref=e443] [cursor=pointer]:
                - /url: "#cite_note-54"
          - paragraph [ref=e444]:
            - text: The name Python derives from the British comedy series
            - link "Monty Python's Flying Circus" [ref=e446] [cursor=pointer]:
              - /url: /wiki/Monty_Python%27s_Flying_Circus
            - text: .
            - superscript [ref=e447]:
              - link "[53]" [ref=e448] [cursor=pointer]:
                - /url: "#cite_note-:0-55"
            - text: (See
            - link "§ Naming" [ref=e449] [cursor=pointer]:
              - /url: "#Naming"
            - text: .)
          - paragraph [ref=e450]:
            - text: Python 2.0 was released on 16 October 2000, featuring many new features such as
            - link "list comprehensions" [ref=e451] [cursor=pointer]:
              - /url: /wiki/List_comprehension
            - text: ","
            - link "cycle-detecting" [ref=e452] [cursor=pointer]:
              - /url: /wiki/Cycle_detection
            - text: garbage collection,
            - link "reference counting" [ref=e453] [cursor=pointer]:
              - /url: /wiki/Reference_counting
            - text: ", and"
            - link "Unicode" [ref=e454] [cursor=pointer]:
              - /url: /wiki/Unicode
            - text: support.
            - superscript [ref=e455]:
              - link "[54]" [ref=e456] [cursor=pointer]:
                - /url: "#cite_note-newin-2.0-56"
            - text: Python 2.7's
            - link "end-of-life" [ref=e457] [cursor=pointer]:
              - /url: /wiki/End-of-life_product
            - text: was initially set for 2015, and then postponed to 2020 out of concern that a large body of existing code could not easily be forward-ported to Python 3.
            - superscript [ref=e458]:
              - link "[55]" [ref=e459] [cursor=pointer]:
                - /url: "#cite_note-57"
            - superscript [ref=e460]:
              - link "[56]" [ref=e461] [cursor=pointer]:
                - /url: "#cite_note-58"
            - text: It no longer receives security patches or updates.
            - superscript [ref=e462]:
              - link "[57]" [ref=e463] [cursor=pointer]:
                - /url: "#cite_note-59"
            - superscript [ref=e464]:
              - link "[58]" [ref=e465] [cursor=pointer]:
                - /url: "#cite_note-60"
            - text: While Python 2.7 and older versions are officially unsupported, a different unofficial Python implementation,
            - link "PyPy" [ref=e466] [cursor=pointer]:
              - /url: /wiki/PyPy
            - text: ", continues to support Python 2, i.e., \"2.7.18+\" (plus 3.11), with the plus signifying (at least some) \""
            - link "backported" [ref=e467] [cursor=pointer]:
              - /url: /wiki/Backporting
            - text: security updates".
            - superscript [ref=e468]:
              - link "[59]" [ref=e469] [cursor=pointer]:
                - /url: "#cite_note-61"
          - paragraph [ref=e470]:
            - text: Python 3.0 was released on 3 December 2008, and was a major revision and not completely
            - link "backward-compatible" [ref=e471] [cursor=pointer]:
              - /url: /wiki/Backward-compatible
            - text: with earlier versions, with some new semantics and changed syntax. Python 2.7.18, released in 2020, was the last release of Python 2.
            - superscript [ref=e472]:
              - link "[60]" [ref=e473] [cursor=pointer]:
                - /url: "#cite_note-62"
            - text: Several releases in the Python 3.x series have added new syntax to the language, and made a few (considered very minor) backward-incompatible changes.
          - paragraph [ref=e474]:
            - text: As of January 2026 , Python 3.14.4 is the latest stable release. All older 3.x versions had a security update down to Python 3.9.24 then again with 3.9.25, the final version in 3.9 series. Python 3.10 is, since November 2025, the oldest supported branch.
            - superscript [ref=e475]:
              - link "[61]" [ref=e476] [cursor=pointer]:
                - /url: "#cite_note-63"
            - text: Python 3.15 has an alpha released, and Android has an official downloadable executable available for Python 3.14. Releases receive two years of full support followed by three years of security support.
          - generic [ref=e477]:
            - heading "Design philosophy and features" [level=2] [ref=e478]
            - generic [ref=e479]:
              - text: "["
              - link "edit" [ref=e480] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=2
              - text: "]"
          - paragraph [ref=e481]:
            - text: Python is a
            - link "multi-paradigm programming language" [ref=e482] [cursor=pointer]:
              - /url: /wiki/Multi-paradigm_programming_language
            - text: . Object-oriented programming and structured programming are fully supported, and many of their features support functional programming and
            - link "aspect-oriented programming" [ref=e483] [cursor=pointer]:
              - /url: /wiki/Aspect-oriented_programming
            - text: – including
            - link "metaprogramming" [ref=e484] [cursor=pointer]:
              - /url: /wiki/Metaprogramming
            - superscript [ref=e485]:
              - link "[62]" [ref=e486] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-13-64"
            - text: and
            - link "metaobjects" [ref=e487] [cursor=pointer]:
              - /url: /wiki/Metaobject
            - text: .
            - superscript [ref=e488]:
              - link "[63]" [ref=e489] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-14-65"
            - text: Many other paradigms are supported via extensions, including
            - link "design by contract" [ref=e490] [cursor=pointer]:
              - /url: /wiki/Design_by_contract
            - superscript [ref=e491]:
              - link "[64]" [ref=e492] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-15-66"
            - superscript [ref=e493]:
              - link "[65]" [ref=e494] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-16-67"
            - text: and
            - link "logic programming" [ref=e495] [cursor=pointer]:
              - /url: /wiki/Logic_programming
            - text: .
            - superscript [ref=e496]:
              - link "[66]" [ref=e497] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-17-68"
            - text: Python is often referred to as a
            - link "'glue language'" [ref=e500] [cursor=pointer]:
              - /url: /wiki/Glue_language
            - superscript [ref=e501]:
              - link "[67]" [ref=e502] [cursor=pointer]:
                - /url: "#cite_note-69"
            - text: because it is purposely designed to be able to integrate components written in other languages.
          - paragraph [ref=e503]:
            - text: Python uses dynamic typing and a combination of
            - link "reference counting" [ref=e504] [cursor=pointer]:
              - /url: /wiki/Reference_counting
            - text: and a cycle-detecting garbage collector for
            - link "memory management" [ref=e505] [cursor=pointer]:
              - /url: /wiki/Memory_management
            - text: .
            - superscript [ref=e506]:
              - link "[68]" [ref=e507] [cursor=pointer]:
                - /url: "#cite_note-Reference_counting-70"
            - text: It uses dynamic
            - link "name resolution" [ref=e508] [cursor=pointer]:
              - /url: /wiki/Name_resolution_(programming_languages)
            - text: (
            - link "late binding" [ref=e509] [cursor=pointer]:
              - /url: /wiki/Late_binding
            - text: ), which binds method and variable names during program execution.
          - paragraph [ref=e510]:
            - text: Python's design offers some support for functional programming in the "
            - link "Lisp" [ref=e511] [cursor=pointer]:
              - /url: /wiki/Lisp_(programming_language)
            - text: tradition". It has
            - code [ref=e512]: filter
            - text: ","
            - code [ref=e513]: map
            - text: ", and"
            - code [ref=e514]: reduce
            - text: functions;
            - link "list comprehensions" [ref=e515] [cursor=pointer]:
              - /url: /wiki/List_comprehension
            - text: ","
            - link "dictionaries" [ref=e516] [cursor=pointer]:
              - /url: /wiki/Associative_array
            - text: ","
            - link "sets" [ref=e517] [cursor=pointer]:
              - /url: /wiki/Set_(mathematics)
            - text: ", and"
            - link "generator" [ref=e518] [cursor=pointer]:
              - /url: /wiki/Generator_(computer_programming)
            - text: expressions.
            - superscript [ref=e519]:
              - link "[69]" [ref=e520] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-59-71"
            - text: The standard library has two modules (
            - code [ref=e521]: itertools
            - text: and
            - code [ref=e522]: functools
            - text: ) that implement functional tools borrowed from
            - link "Haskell" [ref=e523] [cursor=pointer]:
              - /url: /wiki/Haskell
            - text: and
            - link "Standard ML" [ref=e524] [cursor=pointer]:
              - /url: /wiki/Standard_ML
            - text: .
            - superscript [ref=e525]:
              - link "[70]" [ref=e526] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-18-72"
          - paragraph [ref=e527]:
            - text: Python's core philosophy is summarized in the
            - link "Zen of Python" [ref=e528] [cursor=pointer]:
              - /url: /wiki/Zen_of_Python
            - text: (PEP 20) written by
            - link "Tim Peters" [ref=e529] [cursor=pointer]:
              - /url: /wiki/Tim_Peters_(software_engineer)
            - text: ", which includes aphorisms such as these:"
            - superscript [ref=e530]:
              - link "[71]" [ref=e531] [cursor=pointer]:
                - /url: "#cite_note-PEP20-73"
          - list [ref=e532]:
            - listitem [ref=e533]: Explicit is better than implicit.
            - listitem [ref=e534]: Simple is better than complex.
            - listitem [ref=e535]: Readability counts.
            - listitem [ref=e536]: Special cases aren't special enough to break the rules.
            - listitem [ref=e537]: Although practicality beats purity, errors should never pass silently, unless explicitly silenced.
            - listitem [ref=e538]: There should be one-- and preferably only one --obvious way to do it.
          - paragraph [ref=e539]:
            - text: However, Python has received criticism for violating these principles and adding unnecessary language bloat.
            - superscript [ref=e540]:
              - link "[72]" [ref=e541] [cursor=pointer]:
                - /url: "#cite_note-Python-Changes-2014-74"
            - text: Responses to these criticisms note that the Zen of Python is a guideline rather than a rule.
            - superscript [ref=e542]:
              - link "[73]" [ref=e543] [cursor=pointer]:
                - /url: "#cite_note-Confusion-regarding-a-rule-in-the-Zen-of-Python-75"
            - text: "The addition of some new features had been controversial: Guido van Rossum resigned as Benevolent Dictator for Life after conflict about adding the assignment expression operator in Python 3.8."
            - superscript [ref=e544]:
              - link "[74]" [ref=e545] [cursor=pointer]:
                - /url: "#cite_note-The-Most-Controversial-Python-Walrus-Operator-76"
            - superscript [ref=e546]:
              - link "[75]" [ref=e547] [cursor=pointer]:
                - /url: "#cite_note-The-Controversy-Behind-The-Walrus-Operator-in-Python-77"
          - paragraph [ref=e548]:
            - text: Nevertheless, rather than building all functionality into its core, Python was designed to be highly
            - link "extensible" [ref=e549] [cursor=pointer]:
              - /url: /wiki/Extensible
            - text: via modules. This compact modularity has made it particularly popular as a means of adding programmable interfaces to existing applications. Van Rossum's vision of a small core language with a large standard library and easily extensible interpreter stemmed from his frustrations with ABC, which represented the opposite approach.
            - superscript [ref=e550]:
              - link "[11]" [ref=e551] [cursor=pointer]:
                - /url: "#cite_note-venners-interview-pt-1-13"
          - paragraph [ref=e552]:
            - text: Python claims to strive for a simpler, less-cluttered
            - link "syntax" [ref=e553] [cursor=pointer]:
              - /url: /wiki/Syntax_(programming_languages)
            - text: and grammar, while giving developers a choice in their coding methodology. Python lacks
            - link "do .. while loops" [ref=e554] [cursor=pointer]:
              - /url: /wiki/Loop_(statement)#Post-test_loop
              - code [ref=e555]: do .. while
              - text: loops
            - text: ", which"
            - link "Rossum" [ref=e556] [cursor=pointer]:
              - /url: /wiki/Guido_Van_Rossum
            - text: considered harmful.
            - superscript [ref=e557]:
              - link "[76]" [ref=e558] [cursor=pointer]:
                - /url: "#cite_note-78"
            - text: In contrast to
            - link "Perl" [ref=e559] [cursor=pointer]:
              - /url: /wiki/Perl
            - text: "'s motto \""
            - link "there is more than one way to do it" [ref=e560] [cursor=pointer]:
              - /url: /wiki/There_is_more_than_one_way_to_do_it
            - text: "\", Python advocates an approach where \"there should be one – and preferably only one – obvious way to do it\"."
            - superscript [ref=e561]:
              - link "[71]" [ref=e562] [cursor=pointer]:
                - /url: "#cite_note-PEP20-73"
            - text: In practice, however, Python provides many ways to achieve a given goal. There are at least three ways to format a string literal, with no certainty as to which one a programmer should use.
            - superscript [ref=e563]:
              - link "[77]" [ref=e564] [cursor=pointer]:
                - /url: "#cite_note-Python-String-Formatting-Best-Practices-79"
            - link "Alex Martelli" [ref=e565] [cursor=pointer]:
              - /url: /wiki/Alex_Martelli
            - text: is a
            - link "Fellow" [ref=e566] [cursor=pointer]:
              - /url: /wiki/Fellow
            - text: at the
            - link "Python Software Foundation" [ref=e567] [cursor=pointer]:
              - /url: /wiki/Python_Software_Foundation
            - text: and Python book author; he wrote that "To describe something as 'clever' is not considered a compliment in the Python culture."
            - superscript [ref=e568]:
              - link "[78]" [ref=e569] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-19-80"
          - paragraph [ref=e570]:
            - text: Python's developers typically prioritize readability over performance. For example, they reject patches to non-critical parts of the
            - link "CPython" [ref=e571] [cursor=pointer]:
              - /url: /wiki/CPython
            - text: reference implementation that would offer increases in speed that do not justify the cost of clarity and readability.
            - superscript [ref=e572]:
              - link "[79]" [ref=e573] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-20-81"
            - superscript [ref=e574]:
              - text: "["
              - link "failed verification" [ref=e576] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Verifiability
              - text: "]"
            - text: Execution speed can be improved by moving speed-critical functions to extension modules written in languages such as
            - link "C" [ref=e577] [cursor=pointer]:
              - /url: /wiki/C_(programming_language)
            - text: ", or by using a"
            - link "just-in-time compiler" [ref=e578] [cursor=pointer]:
              - /url: /wiki/Just-in-time_compiler
            - text: like
            - link "PyPy" [ref=e579] [cursor=pointer]:
              - /url: /wiki/PyPy
            - text: . Also, it is possible to transpile to other languages. However, this approach either fails to achieve the expected speed-up, since Python is a very
            - link "dynamic language" [ref=e580] [cursor=pointer]:
              - /url: /wiki/Dynamic_language
            - text: ", or only a restricted subset of Python is compiled (with potential minor semantic changes)."
            - superscript [ref=e581]:
              - link "[80]" [ref=e582] [cursor=pointer]:
                - /url: "#cite_note-PyJL-82"
          - paragraph [ref=e583]:
            - text: Python is meant to be a fun language to use. This goal is reflected in the name – a tribute to the British comedy group
            - link "Monty Python" [ref=e584] [cursor=pointer]:
              - /url: /wiki/Monty_Python
            - superscript [ref=e585]:
              - link "[81]" [ref=e586] [cursor=pointer]:
                - /url: "#cite_note-whyname-83"
            - text: – and in playful approaches to some tutorials and reference materials. For instance, some code examples use the terms "spam" and "eggs" (in reference to
            - link "a Monty Python sketch" [ref=e587] [cursor=pointer]:
              - /url: /wiki/Spam_(Monty_Python)
            - text: ), rather than the typical terms
            - link "\"foo\" and \"bar\"" [ref=e588] [cursor=pointer]:
              - /url: /wiki/Foobar
            - text: .
            - superscript [ref=e589]:
              - link "[82]" [ref=e590] [cursor=pointer]:
                - /url: "#cite_note-84"
            - superscript [ref=e591]:
              - link "[83]" [ref=e592] [cursor=pointer]:
                - /url: "#cite_note-pprint-doc-85"
          - paragraph [ref=e593]:
            - text: A common
            - link "neologism" [ref=e594] [cursor=pointer]:
              - /url: /wiki/Neologism
            - text: "in the Python community is pythonic, which has a broad range of meanings related to program style: Pythonic code may use Python"
            - link "idioms" [ref=e595] [cursor=pointer]:
              - /url: /wiki/Programming_idiom
            - text: well; be natural or show fluency in the language; or conform with Python's minimalist philosophy and emphasis on readability.
            - superscript [ref=e596]:
              - link "[84]" [ref=e597] [cursor=pointer]:
                - /url: "#cite_note-86"
          - generic [ref=e598]:
            - heading "Syntax and semantics" [level=2] [ref=e599]
            - generic [ref=e600]:
              - text: "["
              - link "edit" [ref=e601] [cursor=pointer]:
