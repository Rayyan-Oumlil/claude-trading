              - text: "]"
          - paragraph [ref=e630]:
            - text: Python's
            - link "statements" [ref=e631] [cursor=pointer]:
              - /url: /wiki/Statement_(computer_science)
            - text: "include the following:"
          - list [ref=e632]:
            - listitem [ref=e633]:
              - text: The
              - link "assignment" [ref=e634] [cursor=pointer]:
                - /url: /wiki/Assignment_(computer_science)
              - text: statement, using a single equals sign
              - code [ref=e635]: =
            - listitem [ref=e636]:
              - text: The
              - code [ref=e637]:
                - link "if" [ref=e638] [cursor=pointer]:
                  - /url: /wiki/If-then-else
              - text: statement, which conditionally executes a block of code, along with
              - code [ref=e639]:
                - link "else" [ref=e640] [cursor=pointer]:
                  - /url: /wiki/Conditional_(computer_programming)#If–then(–else)
              - text: and
              - code [ref=e641]: elif
              - text: (a contraction of
              - code [ref=e642]:
                - link "else if" [ref=e643] [cursor=pointer]:
                  - /url: /wiki/Conditional_(computer_programming)#Else_if
              - text: )
            - listitem [ref=e644]:
              - text: The
              - code [ref=e645]:
                - link "for" [ref=e646] [cursor=pointer]:
                  - /url: /wiki/Foreach#Python
              - text: statement, which iterates over an iterable object, capturing each element to a variable for use by the attached block; the variable is not deleted when the loop finishes
            - listitem [ref=e647]:
              - text: The
              - code [ref=e648]:
                - link "while" [ref=e649] [cursor=pointer]:
                  - /url: /wiki/While_loop#Python
              - text: statement, which executes a block of code as long as boolean condition is true
            - listitem [ref=e650]:
              - text: The
              - code [ref=e651]:
                - link "try" [ref=e652] [cursor=pointer]:
                  - /url: /wiki/Exception_handling_syntax#Python
              - text: statement, which allows exceptions raised in its attached code block to be caught and handled by
              - code [ref=e653]: except
              - text: clauses (or new syntax
              - code [ref=e654]: except*
              - text: in Python 3.11 for exception groups);
              - superscript [ref=e655]:
                - link "[89]" [ref=e656] [cursor=pointer]:
                  - /url: "#cite_note-91"
              - text: the
              - code [ref=e657]: try
              - text: statement also ensures that clean-up code in a
              - code [ref=e658]: finally
              - text: block is always run regardless of how the block exits
            - listitem [ref=e659]:
              - text: The
              - code [ref=e660]: raise
              - text: statement, used to raise a specified exception or re-raise a caught exception
            - listitem [ref=e661]:
              - text: The
              - code [ref=e662]: class
              - text: statement, which executes a block of code and attaches its local namespace to a
              - link "class" [ref=e663] [cursor=pointer]:
                - /url: /wiki/Class_(computer_science)
              - text: ", for use in object-oriented programming"
            - listitem [ref=e664]:
              - text: The
              - code [ref=e665]: def
              - text: statement, which defines a
              - link "function" [ref=e666] [cursor=pointer]:
                - /url: /wiki/Function_(computing)
              - text: or
              - link "method" [ref=e667] [cursor=pointer]:
                - /url: /wiki/Method_(computing)
            - listitem [ref=e668]:
              - text: The
              - code [ref=e669]:
                - link "with" [ref=e670] [cursor=pointer]:
                  - /url: /wiki/Dispose_pattern#Language_constructs
              - text: statement, which encloses a code block within a context manager, allowing
              - link "resource-acquisition-is-initialization" [ref=e671] [cursor=pointer]:
                - /url: /wiki/Resource_acquisition_is_initialization
              - text: (RAII)-like behavior and replacing a common try/finally idiom
              - superscript [ref=e672]:
                - link "[90]" [ref=e673] [cursor=pointer]:
                  - /url: "#cite_note-92"
              - text: Examples of a context include acquiring a
              - link "lock" [ref=e674] [cursor=pointer]:
                - /url: /wiki/Lock_(computer_science)
              - text: before some code is run, and then releasing the lock; or opening and then closing a
              - link "file" [ref=e675] [cursor=pointer]:
                - /url: /wiki/Computer_file
            - listitem [ref=e676]:
              - text: The
              - code [ref=e677]:
                - link "break" [ref=e678] [cursor=pointer]:
                  - /url: /wiki/Break_statement
              - text: statement, which exits a loop
            - listitem [ref=e679]:
              - text: The
              - code [ref=e680]: continue
              - text: statement, which skips the rest of the current iteration and continues with the next
            - listitem [ref=e681]:
              - text: The
              - code [ref=e682]: del
              - text: statement, which removes a variable—deleting the reference from the name to the value, and producing an error if the variable is referred to before it is redefined
              - superscript [ref=e683]:
                - link "[c]" [ref=e684] [cursor=pointer]:
                  - /url: "#cite_note-93"
            - listitem [ref=e685]:
              - text: The
              - code [ref=e686]: pass
              - text: statement, serving as a
              - link "NOP" [ref=e687] [cursor=pointer]:
                - /url: /wiki/NOP_(code)
              - text: (i.e., no operation), which is syntactically needed to create an empty code block
            - listitem [ref=e688]:
              - text: The
              - code [ref=e689]:
                - link "assert" [ref=e690] [cursor=pointer]:
                  - /url: /wiki/Assertion_(programming)
              - text: statement, used in debugging to check for conditions that should apply
            - listitem [ref=e691]:
              - text: The
              - code [ref=e692]: yield
              - text: statement, which returns a value from a
              - link "generator" [ref=e693] [cursor=pointer]:
                - /url: /wiki/Generator_(computer_programming)#Python
              - text: function (and also an operator); used to implement
              - link "coroutines" [ref=e694] [cursor=pointer]:
                - /url: /wiki/Coroutine
            - listitem [ref=e695]:
              - text: The
              - code [ref=e696]: return
              - text: statement, used to return a value from a function
            - listitem [ref=e697]:
              - text: The
              - code [ref=e698]:
                - link "import" [ref=e699] [cursor=pointer]:
                  - /url: /wiki/Include_directive
              - text: and
              - code [ref=e700]: from
              - text: statements, used to import modules whose functions or variables can be used in the current program
            - listitem [ref=e701]:
              - text: The
              - code [ref=e702]: match
              - text: and
              - code [ref=e703]: case
              - text: statements, analogous to a
              - link "switch statement" [ref=e704] [cursor=pointer]:
                - /url: /wiki/Switch_statement
              - text: construct, which compares an expression against one or more cases as a control-flow measure
          - paragraph [ref=e705]:
            - text: The assignment statement (
            - code [ref=e706]: =
            - text: ) binds a name as a
            - link "reference" [ref=e707] [cursor=pointer]:
              - /url: /wiki/Pointer_(computer_programming)
            - text: to a separate, dynamically allocated
            - link "object" [ref=e708] [cursor=pointer]:
              - /url: /wiki/Object_(computer_science)
            - text: . Variables may subsequently be rebound at any time to any object. In Python, a variable name is a generic reference holder without a fixed
            - link "data type" [ref=e709] [cursor=pointer]:
              - /url: /wiki/Type_system
            - text: ; however, it always refers to some object with a type. This is called
            - link "dynamic typing" [ref=e710] [cursor=pointer]:
              - /url: /wiki/Type_system#Dynamic_type_checking_and_runtime_type_information
            - text: —in contrast to
            - link "statically-typed" [ref=e711] [cursor=pointer]:
              - /url: /wiki/Statically-typed
            - text: languages, where each variable may contain only a value of a certain type.
          - paragraph [ref=e712]:
            - text: Python does not support
            - link "tail call" [ref=e713] [cursor=pointer]:
              - /url: /wiki/Tail_call
            - text: optimization or
            - link "first-class continuations" [ref=e714] [cursor=pointer]:
              - /url: /wiki/First-class_continuations
            - text: ; according to Van Rossum, the language never will.
            - superscript [ref=e715]:
              - link "[91]" [ref=e716] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-55-94"
            - superscript [ref=e717]:
              - link "[92]" [ref=e718] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-56-95"
            - text: However, better support for
            - link "coroutine" [ref=e719] [cursor=pointer]:
              - /url: /wiki/Coroutine
            - text: "-like functionality is provided by extending Python's generators."
            - superscript [ref=e720]:
              - link "[93]" [ref=e721] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-57-96"
            - text: Before 2.5, generators were
            - link "lazy" [ref=e722] [cursor=pointer]:
              - /url: /wiki/Lazy_evaluation
            - link "iterators" [ref=e723] [cursor=pointer]:
              - /url: /wiki/Iterator
            - text: ; data was passed unidirectionally out of the generator. From Python 2.5 on, it is possible to pass data back into a generator function; and from version 3.3, data can be passed through multiple stack levels.
            - superscript [ref=e724]:
              - link "[94]" [ref=e725] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-58-97"
          - generic [ref=e726]:
            - heading "Expressions" [level=3] [ref=e727]
            - generic [ref=e728]:
              - text: "["
              - link "edit" [ref=e729] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=6
              - text: "]"
          - paragraph [ref=e730]:
            - text: Python's
            - link "expressions" [ref=e731] [cursor=pointer]:
              - /url: /wiki/Expression_(computer_science)
            - text: "include the following:"
          - list [ref=e732]:
            - listitem [ref=e733]:
              - text: The
              - code [ref=e734]: +
              - text: ","
              - code [ref=e735]: "-"
              - text: ", and"
              - code [ref=e736]: "*"
              - text: "operators for mathematical addition, subtraction, and multiplication are similar to other languages, but the behavior of division differs. There are two types of division in Python:"
              - link "floor division" [ref=e737] [cursor=pointer]:
                - /url: /wiki/Floor_division
              - text: (or integer division)
              - code [ref=e738]: //
              - text: ", and floating-point division"
              - code [ref=e739]: /
              - text: .
              - superscript [ref=e740]:
                - link "[95]" [ref=e741] [cursor=pointer]:
                  - /url: "#cite_note-98"
              - text: Python uses the
              - code [ref=e742]: "**"
              - text: operator for exponentiation.
            - listitem [ref=e743]:
              - text: Python uses the
              - code [ref=e744]: +
              - text: operator for string concatenation. The language uses the
              - code [ref=e745]: "*"
              - text: operator for duplicating a string a specified number of times.
            - listitem [ref=e746]:
              - text: The
              - code [ref=e747]: "@"
              - text: infix operator is intended to be used by libraries such as
              - link "NumPy" [ref=e748] [cursor=pointer]:
                - /url: /wiki/NumPy
              - text: for
              - link "matrix multiplication" [ref=e749] [cursor=pointer]:
                - /url: /wiki/Matrix_multiplication
              - text: .
              - superscript [ref=e750]:
                - link "[96]" [ref=e751] [cursor=pointer]:
                  - /url: "#cite_note-PEP465-99"
              - superscript [ref=e752]:
                - link "[97]" [ref=e753] [cursor=pointer]:
                  - /url: "#cite_note-Python3.5Changelog-100"
            - listitem [ref=e754]:
              - text: The syntax
              - code [ref=e755]: :=
              - text: ", called the \""
              - generic [ref=e756]: walrus operator
              - text: "\", was introduced in Python 3.8. This operator assigns values to variables as part of a larger expression."
              - superscript [ref=e757]:
                - link "[98]" [ref=e758] [cursor=pointer]:
                  - /url: "#cite_note-Python3.8Changelog-101"
            - listitem [ref=e759]:
              - text: In Python,
              - code [ref=e760]: ==
              - text: compares two objects by value. Python's
              - code [ref=e761]: is
              - text: operator may be used to compare object identities (i.e., comparison by reference), and comparisons may be chained—for example,
              - code [ref=e762]: a <= b <= c
              - text: .
            - listitem [ref=e763]:
              - text: Python uses
              - code [ref=e764]: and
              - text: ","
              - code [ref=e765]: or
              - text: ", and"
              - code [ref=e766]: not
              - text: as Boolean operators.
            - listitem [ref=e767]:
              - text: Python has a type of expression called a
              - link "list comprehension" [ref=e769] [cursor=pointer]:
                - /url: /wiki/List_comprehension#Python
              - text: ", and a more general expression called a generator expression."
              - superscript [ref=e770]:
                - link "[69]" [ref=e771] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-59-71"
            - listitem [ref=e772]:
              - link "Anonymous functions" [ref=e773] [cursor=pointer]:
                - /url: /wiki/Anonymous_function
              - text: are implemented using
              - link "lambda expressions" [ref=e774] [cursor=pointer]:
                - /url: /wiki/Lambda_(programming)
              - text: ; however, there may be only one expression in each body.
            - listitem [ref=e775]:
              - text: Conditional expressions are written as
              - code [ref=e776]: x if c else y
              - text: .
              - superscript [ref=e777]:
                - link "[99]" [ref=e778] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-60-102"
              - text: (This is different in operand order from the
              - code [ref=e779]:
                - 'link "c ? x : y" [ref=e780] [cursor=pointer]':
                  - /url: "/wiki/%3F:"
              - text: operator common to many other languages.)
            - listitem [ref=e781]:
              - text: Python makes a distinction between
              - link "lists" [ref=e782] [cursor=pointer]:
                - /url: /wiki/List_(computer_science)
              - text: and
              - link "tuples" [ref=e783] [cursor=pointer]:
                - /url: /wiki/Tuple
              - text: . Lists are written as
              - code [ref=e784]: "[1, 2, 3]"
              - text: ", are mutable, and cannot be used as the keys of dictionaries (since dictionary keys must be"
              - link "immutable" [ref=e785] [cursor=pointer]:
                - /url: /wiki/Immutable
              - text: in Python). Tuples, written as
              - code [ref=e786]: (1, 2, 3)
              - text: ", are immutable and thus can be used as the keys of dictionaries, provided that all of the tuple's elements are immutable. The"
              - code [ref=e787]: +
              - text: operator can be used to concatenate two tuples, which does not directly modify their contents, but produces a new tuple containing the elements of both. For example, given the variable
              - code [ref=e788]: t
              - text: initially equal to
              - code [ref=e789]: (1, 2, 3)
              - text: ", executing"
              - code [ref=e790]: t = t + (4, 5)
              - text: first evaluates
              - code [ref=e791]: t + (4, 5)
              - text: ", which yields"
              - code [ref=e792]: (1, 2, 3, 4, 5)
              - text: ; this result is then assigned back to
              - code [ref=e793]: t
              - text: —thereby effectively "modifying the contents" of
              - code [ref=e794]: t
              - text: while conforming to the immutable nature of tuple objects. Parentheses are optional for tuples in unambiguous contexts.
              - superscript [ref=e795]:
                - link "[100]" [ref=e796] [cursor=pointer]:
                  - /url: "#cite_note-103"
            - listitem [ref=e797]:
              - text: Python features sequence unpacking where multiple expressions, each evaluating to something assignable (e.g., a variable or a writable property) are associated just as in forming tuple literal; as a whole, the results are then put on the left-hand side of the equal sign in an assignment statement. This statement expects an iterable object on the right-hand side of the equal sign to produce the same number of values as the writable expressions on the left-hand side; while iterating, the statement assigns each of the values produced on the right to the corresponding expression on the left.
              - superscript [ref=e798]:
                - link "[101]" [ref=e799] [cursor=pointer]:
                  - /url: "#cite_note-104"
            - listitem [ref=e800]:
              - text: Python has a "string format" operator
              - code [ref=e801]: "%"
              - text: that functions analogously to
              - code [ref=e802]:
                - link "printf" [ref=e803] [cursor=pointer]:
                  - /url: /wiki/Printf
              - text: format strings in the C language—e.g.
              - code [ref=e804]: "\"spam=%s eggs=%d\" % (\"blah\", 2)"
              - text: evaluates to
              - code [ref=e805]: "\"spam=blah eggs=2\""
              - text: . In Python 2.6+ and 3+, this operator was supplemented by the
              - code [ref=e806]: format()
              - text: method of the
              - code [ref=e807]: str
              - text: class, e.g.,
              - code [ref=e808]: "\"spam={0} eggs={1}\".format(\"blah\", 2)"
              - text: ". Python 3.6 added \"f-strings\":"
              - code [ref=e809]: "spam = \"blah\"; eggs = 2; f'spam={spam} eggs={eggs}'"
              - text: .
              - superscript [ref=e810]:
                - link "[102]" [ref=e811] [cursor=pointer]:
                  - /url: "#cite_note-pep-0498-105"
            - listitem [ref=e812]:
              - text: Strings in Python can be
              - link "concatenated" [ref=e813] [cursor=pointer]:
                - /url: /wiki/Concatenated
              - text: by "adding" them (using the same operator as for adding integers and floats); e.g.,
              - code [ref=e814]: "\"spam\" + \"eggs\""
              - text: returns
              - code [ref=e815]: "\"spameggs\""
              - text: . If strings contain numbers, they are concatenated as strings rather than as integers, e.g.
              - code [ref=e816]: "\"2\" + \"2\""
              - text: returns
              - code [ref=e817]: "\"22\""
              - text: .
            - listitem [ref=e818]:
              - text: Python supports
              - link "string literals" [ref=e819] [cursor=pointer]:
                - /url: /wiki/String_literal
              - text: "in several ways:"
              - list [ref=e820]:
                - listitem [ref=e821]:
                  - text: Delimited by single or double quotation marks; single and double quotation marks have equivalent functionality (unlike in
                  - link "Unix shells" [ref=e822] [cursor=pointer]:
                    - /url: /wiki/Unix_shell
