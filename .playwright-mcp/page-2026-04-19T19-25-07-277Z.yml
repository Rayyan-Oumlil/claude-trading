          - paragraph [ref=e366]:
            - text: Python is a
            - link "high-level" [ref=e367] [cursor=pointer]:
              - /url: /wiki/High-level_programming_language
            - text: ","
            - link "general-purpose programming language" [ref=e368] [cursor=pointer]:
