            - text: ", and it has typed objects but untyped variable names. Type constraints are not checked at definition time; rather, operations on an object may fail at usage time, indicating that the object is not of an appropriate type. Despite being"
            - link "dynamically typed" [ref=e877] [cursor=pointer]:
