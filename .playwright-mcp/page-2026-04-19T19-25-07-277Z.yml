          - paragraph [ref=e1290]:
            - link "CPython" [ref=e1291] [cursor=pointer]:
              - /url: /wiki/CPython
            - text: is the
            - link "reference implementation" [ref=e1292] [cursor=pointer]:
              - /url: /wiki/Reference_implementation
            - text: of Python. This implementation is written in C, meeting the
            - link "C11" [ref=e1293] [cursor=pointer]:
              - /url: /wiki/C11_(C_standard_revision)
            - text: standard
            - superscript [ref=e1294]:
              - link "[132]" [ref=e1295] [cursor=pointer]:
                - /url: "#cite_note-135"
            - text: since version 3.11. Older versions use the
            - link "C89" [ref=e1296] [cursor=pointer]:
              - /url: /wiki/C89_(C_version)
            - text: standard with several select
            - link "C99" [ref=e1297] [cursor=pointer]:
              - /url: /wiki/C99
            - text: features, but third-party extensions are not limited to older C versions—e.g., they can be implemented using C11 or C++.
            - superscript [ref=e1298]:
              - link "[133]" [ref=e1299] [cursor=pointer]:
                - /url: "#cite_note-136"
            - superscript [ref=e1300]:
              - link "[134]" [ref=e1301] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-66-137"
            - text: CPython
            - link "compiles" [ref=e1302] [cursor=pointer]:
              - /url: /wiki/Compiler
            - text: Python programs into an intermediate
            - link "bytecode" [ref=e1303] [cursor=pointer]:
              - /url: /wiki/Bytecode
            - text: ","
            - superscript [ref=e1304]:
              - link "[135]" [ref=e1305] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-67-138"
            - text: which is then executed by a
            - link "virtual machine" [ref=e1306] [cursor=pointer]:
              - /url: /wiki/Virtual_machine
            - text: .
            - superscript [ref=e1307]:
              - link "[136]" [ref=e1308] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-68-139"
            - text: CPython is distributed with a large standard library written in a combination of C and native Python.
          - paragraph [ref=e1309]:
            - text: CPython is available for many platforms, including Windows and most modern
            - link "Unix-like" [ref=e1310] [cursor=pointer]:
              - /url: /wiki/Unix-like
            - text: systems, including macOS (and
            - link "Apple M1" [ref=e1311] [cursor=pointer]:
              - /url: /wiki/Apple_M1
            - text: Macs, since Python 3.9.1, using an experimental installer). Starting with Python 3.9, the Python installer intentionally fails to install on
            - link "Windows 7" [ref=e1312] [cursor=pointer]:
              - /url: /wiki/Windows_7
            - text: and 8;
            - superscript [ref=e1313]:
              - link "[137]" [ref=e1314] [cursor=pointer]:
                - /url: "#cite_note-140"
            - superscript [ref=e1315]:
              - link "[138]" [ref=e1316] [cursor=pointer]:
                - /url: "#cite_note-141"
            - link "Windows XP" [ref=e1317] [cursor=pointer]:
              - /url: /wiki/Windows_XP
            - text: was supported until Python 3.5, with unofficial support for
            - link "VMS" [ref=e1318] [cursor=pointer]:
              - /url: /wiki/OpenVMS
            - text: .
            - superscript [ref=e1319]:
              - link "[139]" [ref=e1320] [cursor=pointer]:
                - /url: "#cite_note-142"
            - text: Platform portability was one of Python's earliest priorities.
            - superscript [ref=e1321]:
              - link "[140]" [ref=e1322] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-69-143"
            - text: During development of Python 1 and 2, even
            - link "OS/2" [ref=e1323] [cursor=pointer]:
              - /url: /wiki/OS/2
            - text: and
            - link "Solaris" [ref=e1324] [cursor=pointer]:
              - /url: /wiki/Solaris_(operating_system)
            - text: were supported;
            - superscript [ref=e1325]:
              - link "[8]" [ref=e1326] [cursor=pointer]:
                - /url: "#cite_note-DownloadOther-9"
            - text: since that time, support has been dropped for many platforms.
          - paragraph [ref=e1327]: All current Python versions (since 3.7) support only operating systems that feature multithreading, by now supporting not nearly as many operating systems (dropping many outdated) than in the past.
          - generic [ref=e1328]:
            - heading "Limitations of the reference implementation" [level=3] [ref=e1329]
            - generic [ref=e1330]:
              - text: "["
              - link "edit" [ref=e1331] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=15
              - text: "]"
          - list [ref=e1332]:
            - listitem [ref=e1333]:
              - text: The energy usage of Python with CPython for typically written code is much worse than C by a factor of 75.88.
              - superscript [ref=e1334]:
                - link "[141]" [ref=e1335] [cursor=pointer]:
                  - /url: "#cite_note-:1-144"
            - listitem [ref=e1336]:
              - text: The throughput of Python with CPython for typically written code is worse than C by a factor of 71.9.
              - superscript [ref=e1337]:
                - link "[141]" [ref=e1338] [cursor=pointer]:
                  - /url: "#cite_note-:1-144"
            - listitem [ref=e1339]:
              - text: The average memory usage of CPython for typically written code is worse than C by a factor of 2.4.
              - superscript [ref=e1340]:
                - link "[141]" [ref=e1341] [cursor=pointer]:
                  - /url: "#cite_note-:1-144"
          - generic [ref=e1342]:
            - heading "Other implementations" [level=3] [ref=e1343]
            - generic [ref=e1344]:
              - text: "["
              - link "edit" [ref=e1345] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=16
              - text: "]"
          - paragraph [ref=e1346]: All alternative implementations have at least slightly different semantics. For example, an alternative may include unordered dictionaries, in contrast to other current Python versions. As another example in the larger Python ecosystem, PyPy does not support the full C Python API.
          - paragraph [ref=e1347]:
            - text: Creating an executable with Python often is done by bundling an entire Python interpreter into the executable, which causes binary sizes to be massive for small programs,
            - superscript [ref=e1348]:
              - link "[142]" [ref=e1349] [cursor=pointer]:
                - /url: "#cite_note-145"
            - text: "yet there exist implementations that are capable of truly compiling Python. Alternative implementations include the following:"
          - list [ref=e1350]:
            - listitem [ref=e1351]:
              - link "PyPy" [ref=e1352] [cursor=pointer]:
                - /url: /wiki/PyPy
              - text: is a faster, compliant interpreter of Python 2.7 and 3.11.
              - superscript [ref=e1353]:
                - link "[143]" [ref=e1354] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-70-146"
              - superscript [ref=e1355]:
                - link "[144]" [ref=e1356] [cursor=pointer]:
                  - /url: "#cite_note-147"
              - text: PyPy's
              - link "just-in-time compiler" [ref=e1357] [cursor=pointer]:
                - /url: /wiki/Just-in-time_compiler
              - text: often improves speed significantly relative to CPython, but PyPy does not support some libraries written in C.
              - superscript [ref=e1358]:
                - link "[145]" [ref=e1359] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-71-148"
              - text: PyPy offers support for the
              - link "RISC-V" [ref=e1360] [cursor=pointer]:
                - /url: /wiki/RISC-V
              - text: instruction-set architecture.
            - listitem [ref=e1361]:
              - text: Codon is an implementation with an
              - link "ahead-of-time (AOT) compiler" [ref=e1362] [cursor=pointer]:
                - /url: /wiki/Ahead-of-time_compilation
              - text: ", which compiles a statically-typed Python-like language whose \"syntax and semantics are nearly identical to Python's, there are some notable differences\""
              - superscript [ref=e1363]:
                - link "[146]" [ref=e1364] [cursor=pointer]:
                  - /url: "#cite_note-149"
              - text: For example, Codon uses 64-bit machine integers for speed, not arbitrarily as with Python; Codon developers claim that speedups over CPython are usually on the order of ten to a hundred times. Codon compiles to machine code (via
              - link "LLVM" [ref=e1365] [cursor=pointer]:
                - /url: /wiki/LLVM
              - text: ) and supports native multithreading.
              - superscript [ref=e1366]:
                - link "[147]" [ref=e1367] [cursor=pointer]:
                  - /url: "#cite_note-150"
              - text: Codon can also compile to Python extension modules that can be imported and used from Python.
            - listitem [ref=e1368]:
              - link "MicroPython" [ref=e1369] [cursor=pointer]:
                - /url: /wiki/MicroPython
              - text: and
              - link "CircuitPython" [ref=e1370] [cursor=pointer]:
                - /url: /wiki/CircuitPython
              - text: are Python 3 variants that are optimized for
              - link "microcontrollers" [ref=e1371] [cursor=pointer]:
                - /url: /wiki/Microcontroller
              - text: ", including the"
              - link "Lego Mindstorms EV3" [ref=e1372] [cursor=pointer]:
                - /url: /wiki/Lego_Mindstorms_EV3
              - text: .
              - superscript [ref=e1373]:
                - link "[148]" [ref=e1374] [cursor=pointer]:
                  - /url: "#cite_note-151"
            - listitem [ref=e1375]:
              - text: Pyston is a variant of the Python runtime that uses just-in-time compilation to speed up execution of Python programs.
              - superscript [ref=e1376]:
                - link "[149]" [ref=e1377] [cursor=pointer]:
                  - /url: "#cite_note-152"
            - listitem [ref=e1378]:
              - text: Cinder is a performance-oriented fork of CPython 3.8 that features a number of optimizations, including bytecode inline caching, eager evaluation of coroutines, a method-at-a-time
              - link "JIT" [ref=e1379] [cursor=pointer]:
                - /url: /wiki/Just-in-time_compilation
              - text: ", and an experimental bytecode compiler."
              - superscript [ref=e1380]:
                - link "[150]" [ref=e1381] [cursor=pointer]:
                  - /url: "#cite_note-153"
            - listitem [ref=e1382]:
              - text: The Snek
              - superscript [ref=e1383]:
                - link "[151]" [ref=e1384] [cursor=pointer]:
                  - /url: "#cite_note-154"
              - superscript [ref=e1385]:
                - link "[152]" [ref=e1386] [cursor=pointer]:
                  - /url: "#cite_note-155"
              - superscript [ref=e1387]:
                - link "[153]" [ref=e1388] [cursor=pointer]:
                  - /url: "#cite_note-156"
              - text: embedded computing language "is Python-inspired, but it is not Python. It is possible to write Snek programs that run under a full Python system, but most Python programs will not run under Snek."
              - superscript [ref=e1389]:
                - link "[154]" [ref=e1390] [cursor=pointer]:
                  - /url: "#cite_note-157"
              - text: Snek is compatible with 8-bit
              - link "AVR microcontrollers" [ref=e1391] [cursor=pointer]:
                - /url: /wiki/AVR_microcontrollers
              - text: such as
              - link "ATmega 328P" [ref=e1392] [cursor=pointer]:
                - /url: /wiki/ATmega
              - text: "-based Arduino, as well as larger microcontrollers that are compatible with"
              - link "MicroPython" [ref=e1393] [cursor=pointer]:
                - /url: /wiki/MicroPython
              - text: . Snek is an imperative language that (unlike Python) omits
              - link "object-oriented programming" [ref=e1394] [cursor=pointer]:
                - /url: /wiki/Object-oriented_programming
              - text: . Snek supports only one numeric data type, which features 32-bit
              - link "single precision" [ref=e1395] [cursor=pointer]:
                - /url: /wiki/Single-precision
              - text: (resembling
              - link "JavaScript" [ref=e1396] [cursor=pointer]:
                - /url: /wiki/JavaScript
              - text: numbers, though smaller).
          - generic [ref=e1397]:
            - heading "Unsupported implementations" [level=3] [ref=e1398]
            - generic [ref=e1399]:
              - text: "["
              - link "edit" [ref=e1400] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=17
              - text: "]"
          - paragraph [ref=e1401]:
            - link "Stackless Python" [ref=e1402] [cursor=pointer]:
              - /url: /wiki/Stackless_Python
            - text: is a significant fork of CPython that implements
            - link "microthreads" [ref=e1403] [cursor=pointer]:
              - /url: /wiki/Microthread
            - text: . This implementation uses the
            - link "call stack" [ref=e1404] [cursor=pointer]:
              - /url: /wiki/Call_stack
            - text: differently, thus allowing massively concurrent programs. PyPy also offers a stackless version.
            - superscript [ref=e1405]:
              - link "[155]" [ref=e1406] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-73-158"
          - paragraph [ref=e1407]: "Just-in-time Python compilers have been developed, but are now unsupported:"
          - list [ref=e1408]:
            - listitem [ref=e1409]:
              - text: Google began a project named
              - link "Unladen Swallow" [ref=e1410] [cursor=pointer]:
                - /url: /wiki/Unladen_Swallow
              - text: "in 2009: this project aimed to speed up the Python interpreter five-fold by using"
              - link "LLVM" [ref=e1411] [cursor=pointer]:
                - /url: /wiki/LLVM
              - text: ", and improve"
              - link "multithreading" [ref=e1412] [cursor=pointer]:
                - /url: /wiki/Multithreading_(computer_architecture)
              - text: capability for scaling to thousands of cores,
              - superscript [ref=e1413]:
                - link "[156]" [ref=e1414] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-74-159"
              - text: while typical implementations are limited by the
              - link "global interpreter lock" [ref=e1415] [cursor=pointer]:
                - /url: /wiki/Global_interpreter_lock
              - text: .
            - listitem [ref=e1416]:
              - link "Psyco" [ref=e1417] [cursor=pointer]:
                - /url: /wiki/Psyco
              - text: is a discontinued
              - link "just-in-time" [ref=e1418] [cursor=pointer]:
                - /url: /wiki/Just-in-time_compilation
              - link "specializing" [ref=e1419] [cursor=pointer]:
                - /url: /wiki/Run-time_algorithm_specialization
              - text: compiler, which integrates with CPython and transforms bytecode to machine code at runtime. The emitted code is specialized for certain
              - link "data types" [ref=e1420] [cursor=pointer]:
                - /url: /wiki/Data_type
              - text: and is faster than standard Python code. Psyco does not support Python 2.7 or later.
            - listitem [ref=e1421]:
              - link "PyS60" [ref=e1422] [cursor=pointer]:
                - /url: /wiki/PyS60
              - text: was a Python 2 interpreter for
              - link "Series 60" [ref=e1423] [cursor=pointer]:
                - /url: /wiki/Series_60
              - text: mobile phones, which was released by
              - link "Nokia" [ref=e1424] [cursor=pointer]:
                - /url: /wiki/Nokia
              - text: in 2005. The interpreter implemented many modules from Python's standard library, as well as additional modules for integration with the
              - link "Symbian" [ref=e1425] [cursor=pointer]:
                - /url: /wiki/Symbian
              - text: operating system. The Nokia
              - link "N900" [ref=e1426] [cursor=pointer]:
                - /url: /wiki/N900
              - text: also supports Python through the
              - link "GTK" [ref=e1427] [cursor=pointer]:
                - /url: /wiki/GTK
              - text: widget library, allowing programs to be written and run on the target device.
              - superscript [ref=e1428]:
                - link "[157]" [ref=e1429] [cursor=pointer]:
                  - /url: "#cite_note-160"
          - generic [ref=e1430]:
            - heading "Transpilers to other languages" [level=3] [ref=e1431]
            - generic [ref=e1432]:
              - text: "["
              - link "edit" [ref=e1433] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=18
              - text: "]"
          - paragraph [ref=e1434]:
            - text: There are several compilers/
            - link "transpilers" [ref=e1435] [cursor=pointer]:
              - /url: /wiki/Transpiler
            - text: "to high-level object languages; the source language is unrestricted Python, a subset of Python, or a language similar to Python:"
          - list [ref=e1436]:
            - listitem [ref=e1437]:
              - text: Brython
              - superscript [ref=e1438]:
                - link "[158]" [ref=e1439] [cursor=pointer]:
                  - /url: "#cite_note-161"
              - text: and Transcrypt
              - superscript [ref=e1440]:
                - link "[159]" [ref=e1441] [cursor=pointer]:
                  - /url: "#cite_note-162"
              - superscript [ref=e1442]:
                - link "[160]" [ref=e1443] [cursor=pointer]:
                  - /url: "#cite_note-163"
              - text: compile Python to
              - link "JavaScript" [ref=e1444] [cursor=pointer]:
                - /url: /wiki/JavaScript
              - text: .
            - listitem [ref=e1445]:
              - link "Cython" [ref=e1446] [cursor=pointer]:
                - /url: /wiki/Cython
              - text: compiles a superset of Python to C. The resulting code can be used with Python via direct C-level API calls into the Python interpreter.
            - listitem [ref=e1447]:
              - text: PyJL compiles/transpiles a subset of Python to "human-readable, maintainable, and high-performance Julia source code".
              - superscript [ref=e1448]:
                - link "[80]" [ref=e1449] [cursor=pointer]:
                  - /url: "#cite_note-PyJL-82"
              - text: Despite the developers' performance claims, this is not possible for arbitrary Python code; that is, compiling to a faster language or machine code is known to be impossible in the general case. The semantics of Python might potentially be changed, but in many cases speedup is possible with few or no changes in the Python code. The faster Julia source code can then be used from Python or compiled to machine code.
            - listitem [ref=e1450]:
              - link "Nuitka" [ref=e1451] [cursor=pointer]:
                - /url: /wiki/Nuitka
              - text: compiles Python into C.
              - superscript [ref=e1452]:
                - link "[161]" [ref=e1453] [cursor=pointer]:
                  - /url: "#cite_note-164"
              - text: This compiler works with Python 3.4 to 3.13 (and 2.6 and 2.7) for Python's main supported platforms (and Windows 7 or even Windows XP) and for Android. The compiler developers claim full support for Python 3.10, partial support for Python 3.11 and 3.12, and experimental support for Python 3.13. Nuitka supports macOS including Apple Silicon-based versions. The compiler is free of cost, though it has commercial add-ons (e.g., for hiding source code).
            - listitem [ref=e1454]:
              - link "Numba" [ref=e1455] [cursor=pointer]:
                - /url: /wiki/Numba
              - text: is a JIT compiler that is used from Python; the compiler translates a subset of Python and NumPy code into fast machine code. This tool is enabled by adding a decorator to the relevant Python code.
            - listitem [ref=e1456]:
              - text: Pythran compiles a subset of Python 3 to C++ (
              - link "C++11" [ref=e1457] [cursor=pointer]:
                - /url: /wiki/C%2B%2B11
              - text: ).
              - superscript [ref=e1458]:
                - link "[162]" [ref=e1459] [cursor=pointer]:
                  - /url: "#cite_note-Guelton_Brunet_Amini_Merlini_2015_p=014001-165"
            - listitem [ref=e1460]:
              - link "RPython" [ref=e1461] [cursor=pointer]:
                - /url: /wiki/RPython
              - text: can be compiled to C, and it is used to build the PyPy interpreter for Python.
            - listitem [ref=e1462]:
              - text: The Python → 11l → C++ transpiler
              - superscript [ref=e1463]:
                - link "[163]" [ref=e1464] [cursor=pointer]:
                  - /url: "#cite_note-166"
              - text: compiles a subset of Python 3 to C++ (
              - link "C++17" [ref=e1465] [cursor=pointer]:
                - /url: /wiki/C%2B%2B17
              - text: ).
          - paragraph [ref=e1466]: "There are also specialized compilers:"
          - list [ref=e1467]:
            - listitem [ref=e1468]:
              - link "MyHDL" [ref=e1469] [cursor=pointer]:
                - /url: /wiki/MyHDL
              - text: is a Python-based
              - link "hardware description language" [ref=e1470] [cursor=pointer]:
                - /url: /wiki/Hardware_description_language
              - text: (HDL) that converts MyHDL code to
              - link "Verilog" [ref=e1471] [cursor=pointer]:
                - /url: /wiki/Verilog
              - text: or
              - link "VHDL" [ref=e1472] [cursor=pointer]:
                - /url: /wiki/VHDL
              - text: code.
          - paragraph [ref=e1473]: "Some older projects existed, as well as compilers not designed for use with Python 3.x and related syntax:"
          - list [ref=e1474]:
            - listitem [ref=e1475]:
              - text: Google's Grumpy
              - link "transpiles" [ref=e1476] [cursor=pointer]:
                - /url: /wiki/Transpile
              - text: Python 2 to
              - link "Go" [ref=e1477] [cursor=pointer]:
                - /url: /wiki/Go_(programming_language)
              - text: .
              - superscript [ref=e1478]:
                - link "[164]" [ref=e1479] [cursor=pointer]:
                  - /url: "#cite_note-167"
              - superscript [ref=e1480]:
                - link "[165]" [ref=e1481] [cursor=pointer]:
                  - /url: "#cite_note-168"
              - superscript [ref=e1482]:
                - link "[166]" [ref=e1483] [cursor=pointer]:
                  - /url: "#cite_note-169"
              - text: The latest release was in 2017.
            - listitem [ref=e1484]:
              - link "IronPython" [ref=e1485] [cursor=pointer]:
                - /url: /wiki/IronPython
              - text: allows running Python 2.7 programs with the .NET
              - link "Common Language Runtime" [ref=e1486] [cursor=pointer]:
                - /url: /wiki/Common_Language_Runtime
              - text: .
              - superscript [ref=e1487]:
                - link "[167]" [ref=e1488] [cursor=pointer]:
                  - /url: "#cite_note-170"
              - text: An
              - link "alpha" [ref=e1489] [cursor=pointer]:
                - /url: /wiki/Software_release_life_cycle#Alpha
              - text: version (released in 2021), is available for "Python 3.4, although features and behaviors from later versions may be included."
              - superscript [ref=e1490]:
                - link "[168]" [ref=e1491] [cursor=pointer]:
                  - /url: "#cite_note-171"
            - listitem [ref=e1492]:
              - link "Jython" [ref=e1493] [cursor=pointer]:
                - /url: /wiki/Jython
              - text: compiles Python 2.7 to Java bytecode, allowing the use of Java libraries from a Python program.
              - superscript [ref=e1494]:
                - link "[169]" [ref=e1495] [cursor=pointer]:
                  - /url: "#cite_note-172"
            - listitem [ref=e1496]:
              - link "Pyrex" [ref=e1497] [cursor=pointer]:
                - /url: /wiki/Pyrex_(programming_language)
              - text: (last released in 2010) and
              - link "Shed Skin" [ref=e1498] [cursor=pointer]:
                - /url: /wiki/Shed_Skin
              - text: (last released in 2013) compile to C and C++ respectively.
          - generic [ref=e1499]:
            - heading "Performance" [level=3] [ref=e1500]
            - generic [ref=e1501]:
              - text: "["
              - link "edit" [ref=e1502] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=19
              - text: "]"
          - paragraph [ref=e1503]:
            - text: A performance comparison among various Python implementations, using a non-numerical (combinatorial) workload, was presented at EuroSciPy '13.
            - superscript [ref=e1504]:
              - link "[170]" [ref=e1505] [cursor=pointer]:
                - /url: "#cite_note-173"
            - text: In addition, Python's performance relative to other programming languages is benchmarked by
            - link "The Computer Language Benchmarks Game" [ref=e1506] [cursor=pointer]:
              - /url: /wiki/The_Computer_Language_Benchmarks_Game
            - text: .
            - superscript [ref=e1507]:
              - link "[171]" [ref=e1508] [cursor=pointer]:
                - /url: "#cite_note-174"
          - paragraph [ref=e1509]:
            - text: There are several approaches to optimizing Python performance, despite the inherent slowness of an
            - link "interpreted language" [ref=e1510] [cursor=pointer]:
              - /url: /wiki/Interpreted_language
            - text: ". These approaches include the following strategies or tools:"
          - list [ref=e1511]:
            - listitem [ref=e1512]:
              - link "Just-in-time compilation" [ref=e1513] [cursor=pointer]:
                - /url: /wiki/Just-in-time_compilation
              - text: ": Dynamically compiling parts of a Python program during the execution of the program. This technique is used in libraries such as"
              - link "Numba" [ref=e1514] [cursor=pointer]:
                - /url: /wiki/Numba
              - text: and
              - link "PyPy" [ref=e1515] [cursor=pointer]:
                - /url: /wiki/PyPy
              - text: .
            - listitem [ref=e1516]:
              - link "Static compilation" [ref=e1517] [cursor=pointer]:
                - /url: /wiki/Compiler
              - text: ": Sometimes, Python code can be compiled into machine code sometime before execution. An example of this approach is"
              - link "Cython" [ref=e1518] [cursor=pointer]:
                - /url: /wiki/Cython
              - text: ", which compiles Python into C."
            - listitem [ref=e1519]:
              - link "Concurrency" [ref=e1520] [cursor=pointer]:
                - /url: /wiki/Concurrent_computing
              - text: and
              - link "parallelism" [ref=e1521] [cursor=pointer]:
                - /url: /wiki/Parallel_computing
              - text: ": Multiple tasks can be run simultaneously. Python contains modules such as `multiprocessing` to support this form of parallelism. Moreover, this approach helps to overcome limitations of the"
              - link "Global Interpreter Lock" [ref=e1522] [cursor=pointer]:
                - /url: /wiki/Global_interpreter_lock
              - text: (GIL) in CPU tasks.
            - listitem [ref=e1523]:
              - text: Efficient
              - link "data structures" [ref=e1524] [cursor=pointer]:
                - /url: /wiki/Data_structures
              - text: ": Performance can also be improved by using data types such as"
              - code [ref=e1525]: Set
              - text: for membership tests, or
              - code [ref=e1526]: deque
              - text: from
              - code [ref=e1527]: collections
              - text: for
              - link "queue" [ref=e1528] [cursor=pointer]:
                - /url: /wiki/Queueing_theory
              - text: operations.
            - listitem [ref=e1529]:
              - text: Performance gains can be observed by utilizing libraries such as
              - link "NumPy" [ref=e1530] [cursor=pointer]:
                - /url: /wiki/NumPy
              - text: . Most high performance Python libraries use
              - link "C" [ref=e1531] [cursor=pointer]:
                - /url: /wiki/C_(programming_language)
              - text: or
              - link "Fortran" [ref=e1532] [cursor=pointer]:
                - /url: /wiki/Fortran
              - text: under the hood instead of the Python interpreter.
              - superscript [ref=e1533]:
                - link "[172]" [ref=e1534] [cursor=pointer]:
                  - /url: "#cite_note-175"
          - generic [ref=e1535]:
            - heading "Language development" [level=2] [ref=e1536]
            - generic [ref=e1537]:
              - text: "["
              - link "edit" [ref=e1538] [cursor=pointer]:
                - /url: /w/index.php?title=Python_(programming_language)&action=edit&section=20
              - text: "]"
          - paragraph [ref=e1539]:
            - text: Python's development is conducted mostly through the Python Enhancement Proposal (PEP) process; this process is the primary mechanism for proposing major new features, collecting community input on issues, and documenting Python design decisions.
            - superscript [ref=e1540]:
              - link "[173]" [ref=e1541] [cursor=pointer]:
                - /url: "#cite_note-PepCite000-176"
            - text: Python coding style is covered in PEP 8.
            - superscript [ref=e1542]:
              - link "[88]" [ref=e1543] [cursor=pointer]:
                - /url: "#cite_note-pep8-90"
            - text: Outstanding PEPs are reviewed and commented on by the Python community and the steering council.
            - superscript [ref=e1544]:
              - link "[173]" [ref=e1545] [cursor=pointer]:
                - /url: "#cite_note-PepCite000-176"
          - paragraph [ref=e1546]:
            - text: Enhancement of the language corresponds with development of the CPython reference implementation. The mailing list python-dev is the primary forum for the language's development. Specific issues were originally discussed in the
            - link "Roundup" [ref=e1547] [cursor=pointer]:
              - /url: /wiki/Roundup_(issue_tracker)
            - link "bug tracker" [ref=e1548] [cursor=pointer]:
              - /url: /wiki/Bug_tracker
            - text: hosted by the foundation.
            - superscript [ref=e1549]:
              - link "[174]" [ref=e1550] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-21-177"
            - text: In 2022, all issues and discussions were migrated to
            - link "GitHub" [ref=e1551] [cursor=pointer]:
              - /url: /wiki/GitHub
            - text: .
            - superscript [ref=e1552]:
              - link "[175]" [ref=e1553] [cursor=pointer]:
                - /url: "#cite_note-178"
            - text: Development originally took place on a
            - link "self-hosted" [ref=e1554] [cursor=pointer]:
              - /url: /wiki/Self-hosting_(web_services)
            - text: source-code repository running
            - link "Mercurial" [ref=e1555] [cursor=pointer]:
              - /url: /wiki/Mercurial
            - text: ", until Python moved to GitHub in January 2017."
            - superscript [ref=e1556]:
              - link "[176]" [ref=e1557] [cursor=pointer]:
                - /url: "#cite_note-py_dev_guide-179"
          - paragraph [ref=e1558]: "CPython's public releases have three types, distinguished by which part of the version number is incremented:"
          - list [ref=e1559]:
            - listitem [ref=e1560]:
              - text: Backward-incompatible versions, where code is expected to break and must be manually
              - link "ported" [ref=e1561] [cursor=pointer]:
                - /url: /wiki/Ported
              - text: . The first part of the version number is incremented. These releases happen infrequently—version 3.0 was released 8 years after 2.0. According to Guido van Rossum, a version 4.0 will probably never exist.
              - superscript [ref=e1562]:
                - link "[177]" [ref=e1563] [cursor=pointer]:
                  - /url: "#cite_note-180"
            - listitem [ref=e1564]:
              - text: Major or "feature" releases are largely compatible with the previous version but introduce new features. The second part of the version number is incremented. Starting with Python 3.9, these releases are expected to occur annually.
              - superscript [ref=e1565]:
                - link "[178]" [ref=e1566] [cursor=pointer]:
                  - /url: "#cite_note-181"
              - superscript [ref=e1567]:
                - link "[179]" [ref=e1568] [cursor=pointer]:
                  - /url: "#cite_note-182"
              - text: Each major version is supported by bug fixes for several years after its release.
              - superscript [ref=e1569]:
                - link "[180]" [ref=e1570] [cursor=pointer]:
                  - /url: "#cite_note-release-schedule-183"
            - listitem [ref=e1571]:
              - text: Bug fix releases,
              - superscript [ref=e1572]:
                - link "[181]" [ref=e1573] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-22-184"
              - text: which introduce no new features, occur approximately every three months; these releases are made when a sufficient number of bugs have been fixed
              - link "upstream" [ref=e1574] [cursor=pointer]:
                - /url: /wiki/Upstream_(software_development)
              - text: since the last release. Security vulnerabilities are also patched in these releases. The third and final part of the version number is incremented.
              - superscript [ref=e1575]:
                - link "[181]" [ref=e1576] [cursor=pointer]:
                  - /url: "#cite_note-AutoNT-22-184"
          - paragraph [ref=e1577]:
            - text: Many
            - link "alpha, beta, and release-candidates" [ref=e1578] [cursor=pointer]:
              - /url: /wiki/Beta_release
            - text: are also released as previews and for testing before final releases. Although there is a rough schedule for releases, they are often delayed if the code is not ready yet. Python's development team monitors the state of the code by running a large
            - link "unit test" [ref=e1579] [cursor=pointer]:
              - /url: /wiki/Unit_test
            - text: suite during development.
            - superscript [ref=e1580]:
              - link "[182]" [ref=e1581] [cursor=pointer]:
                - /url: "#cite_note-AutoNT-23-185"
          - paragraph [ref=e1582]:
            - text: The major
            - link "academic conference" [ref=e1583] [cursor=pointer]:
              - /url: /wiki/Academic_conference
            - text: on Python is
